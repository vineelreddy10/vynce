name: Build Frappe Bench Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "vynce/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/build-bench.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (retry up to 3x for transient errors)
        run: |
          for i in 1 2 3; do
            docker build \
              --build-arg GITLAB_PAT=${{ secrets.GITLAB_PAT }} \
              -t ghcr.io/vineelreddy10/vynce-bench:latest .
            if [ $? -eq 0 ]; then
              docker push ghcr.io/vineelreddy10/vynce-bench:latest
              echo "BUILD_OK"
              break
            fi
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done

