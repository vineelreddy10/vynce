name: Build Frappe Bench Image

on:
  push:
    branches: [main]
    paths:
      - "vynce/**"
      - "pyproject.toml"
      - "Dockerfile"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/vineelreddy10/vynce-bench:latest
          build-args: |
            GITLAB_PAT=${{ secrets.GITLAB_PAT }}
