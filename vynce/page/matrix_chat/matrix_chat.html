<div id="matrix-chat-app" style="display:flex;height:calc(100vh - 100px);gap:0;">
	<div id="mc-sidebar" style="width:300px;min-width:300px;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;background:#1a1c2e;color:#e8e3dd;border-radius:12px 0 0 12px;overflow:hidden;">
		<div style="padding:20px;border-bottom:1px solid rgba(255,255,255,0.08);">
			<h3 style="margin:0;font-size:15px;font-weight:600;">🗨️ Matrix Chat</h3>
			<p style="margin:4px 0 0;font-size:11px;color:rgba(255,255,255,0.5);">POC — In-process Homeserver</p>
			<div id="mc-status" style="margin-top:10px;display:flex;align-items:center;gap:6px;font-size:11px;">
				<span id="mc-status-dot" style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;"></span>
				<span id="mc-status-text" style="color:rgba(255,255,255,0.7);">Connected</span>
			</div>
		</div>
		<div style="padding:12px;border-bottom:1px solid rgba(255,255,255,0.08);">
			<button class="btn btn-sm btn-default" onclick="MC.createTestRoom()" style="width:100%;padding:8px;font-size:12px;border-radius:8px;">+ Create Test Room</button>
		</div>
		<div id="mc-room-list" style="flex:1;overflow-y:auto;padding:8px;">
			<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px;">No rooms yet. Create one above.</div>
		</div>
	</div>

	<div id="mc-main" style="flex:1;display:flex;flex-direction:column;background:#ffffff;border-radius:0 12px 12px 0;overflow:hidden;">
		<div id="mc-chat-header" style="padding:16px 24px;border-bottom:1px solid #e2e8f0;background:#fafafa;display:none;">
			<h3 id="mc-room-name" style="margin:0;font-size:15px;font-weight:600;color:#1a1c2e;"></h3>
			<p id="mc-room-members" style="margin:2px 0 0;font-size:11px;color:#64748b;"></p>
		</div>
		<div id="mc-messages" style="flex:1;overflow-y:auto;padding:20px 24px;display:none;flex-direction:column-reverse;">
			<div id="mc-loading" style="text-align:center;padding:40px;color:#94a3b8;font-size:13px;">Select a room to start chatting</div>
		</div>
		<div id="mc-empty" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;gap:16px;">
			<div style="font-size:48px;">💬</div>
			<div style="font-weight:500;font-size:15px;color:#64748b;">Select a conversation</div>
			<div style="font-size:12px;">Or create a test room to get started</div>
		</div>
		<div id="mc-input-area" style="padding:16px 24px;border-top:1px solid #e2e8f0;display:none;">
			<div style="display:flex;gap:8px;">
				<input id="mc-input" type="text" placeholder="Type a message..."
					style="flex:1;padding:10px 16px;border:1px solid #e2e8f0;border-radius:24px;font-size:13px;outline:none;" />
				<button class="btn btn-primary btn-sm" onclick="MC.sendMessage()" style="border-radius:24px;padding:10px 20px;">Send</button>
			</div>
		</div>
	</div>
</div>
